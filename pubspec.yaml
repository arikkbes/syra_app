name: syra
description: SYRA - İlişki Danışmanın
publish_to: 'none'


version: 1.0.5+60


environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 📁 iOS crash-proof path provider
  path_provider: ^2.1.5

  # 🌐 HTTP
  http: ^1.2.2

  # 💾 Local storage - Hive (native dependency yok → iOS crashsiz)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 💾 Shared Preferences (for feedback fallback)
  shared_preferences: ^2.3.3

  # 🔥 Firebase (Flutter 3.38 resmi stabil kombinasyonu)
  firebase_core: ^3.7.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.3.6

  # 🛒 RevenueCat - En stabil sürüm
  purchases_flutter: ^8.3.0

  # 🔗 URL launcher
  url_launcher: ^6.3.2

  # 📅 intl
  intl: ^0.20.1

  # 📸 Image picker
  image_picker: ^1.0.8
  
  # 📷 Photo manager for gallery access
  photo_manager: ^3.5.1

  # 📝 Markdown rendering
  flutter_markdown_plus: 1.0.6
  markdown: ^7.2.2

  # 📁 File picker
  file_picker: ^8.1.4

  # 🎨 SVG support
  flutter_svg: ^2.0.10+1

  # 🎤 Speech to text — FIXED 7.3.0
  speech_to_text: ^7.3.0

  flutter_lints: ^6.0.0
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  shimmer: ^3.0.0
  path: ^1.9.1

  # 🧊 Inset shadows (glass inner shadows)
  flutter_inset_shadow: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 🖼️ Icon generator
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/syra.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/syra.png
    - assets/images/syra_logo.png
    - assets/images/syra_logo_tarot.png
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
          weight: 400
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700

    # Display/hero font.
    # NOTE: This file is shipped via assets. If you later want the exact DM Serif Display,
    # just replace assets/fonts/DMSerifDisplay-Regular.ttf with the real font file.
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
          weight: 400

    # Geist - Sans-serif for UI elements
    # NOTE: Using Geist-Medium as fallback for regular weight if Geist-Regular doesn't exist
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-LightItalic.ttf
          weight: 300
          style: italic

    # Literata - Serif for assistant messages
    - family: Literata
      fonts:
        - asset: assets/fonts/Literata-Regular.ttf
          weight: 400
        - asset: assets/fonts/Literata-Bold.ttf
          weight: 700

    # Literata7pt - Alternative serif for assistant messages
    - family: Literata7pt
      fonts:
        - asset: assets/fonts/Literata7pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Literata7pt-Bold.ttf
          weight: 700